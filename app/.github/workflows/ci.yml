name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      DIRECT_URL: postgresql://test:test@localhost:5432/test
      AUTH_SECRET: ci-test-secret-do-not-use-in-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      AUTH_SECRET: ci-smoke-test-secret
    steps:
      - uses: actions/checkout@v4
      - name: Build CI Postgres (PostGIS + pgvector)
        run: docker build -t sivrce-pg-ci .github/docker/postgres-ci
      - name: Start Postgres
        run: |
          docker run -d --name sivrce-pg \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=test \
            -p 5432:5432 \
            sivrce-pg-ci
          for i in $(seq 1 30); do
            docker exec sivrce-pg pg_isready -U test && break
            sleep 1
          done
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
        env:
          DIRECT_URL: postgresql://test:test@localhost:5432/test
      - run: npx prisma generate
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npx playwright test --project=chromium
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
